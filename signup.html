<!DOCTYPE html>

<html>

<head>
    <title>Signup</title>

```
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;

        display: flex;
        flex-direction: column;
        align-items: center;

        min-height: 100vh;
        margin: 0;
    }

    .container-box {
        background: white;
        width: 420px;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
        margin-top: 80px;
    }

    h2 {
        margin-bottom: 20px;
    }

    button {
        padding: 10px 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
    }

    .select-btn {
        background: #007BFF;
        color: white;
    }

    .select-btn:hover {
        background: #0056b3;
    }

    input,
    select {
        width: 95%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
        margin-top: 5px;
    }

    .submit-btn {
        background: #28a745;
        color: white;
        margin-top: 10px;
    }

    .submit-btn:hover {
        background: #1e7e34;
    }

    .back-btn {
        background: #6c757d;
        color: white;
        margin-top: 15px;
    }

    .back-btn:hover {
        background: #545b62;
    }

    .alert-container {
        width: 420px;
        margin-top: 30px;
    }
</style>

<script>
    function showDoctorForm() {
        document.getElementById("doctorForm").style.display = "block";
        document.getElementById("patientForm").style.display = "none";
    }

    function showPatientForm() {
        document.getElementById("patientForm").style.display = "block";
        document.getElementById("doctorForm").style.display = "none";
    }
</script>
```

</head>

<body>

```
<!-- Flash Alerts -->
<div class="alert-container">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}

    <div class="alert alert-{{ 'danger' if category == 'fail' else 'success' }} alert-dismissible fade show"
        role="alert">

        {{ message }}

        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>

    </div>

    {% endfor %}
    {% endif %}
    {% endwith %}

</div>


<div class="container-box">

    <h2>Create Account</h2>

    <button class="select-btn" onclick="showDoctorForm()">Signup as Doctor</button>
    <button class="select-btn" onclick="showPatientForm()">Signup as Patient</button>

    <br><br>

    <!-- Doctor Signup -->

    <div id="doctorForm" style="display:none">

        <h3>Doctor Signup</h3>

        <form method="POST" action="/signup">

            <input type="hidden" name="user_type" value="doctor">

            <label>Name</label><br>
            <input type="text" name="name" required><br><br>

            <label>Email</label><br>
            <input type="text" name="email" required><br><br>

            <label>Phone Number</label><br>
            <input type="text" name="phone"><br><br>

            <label>Specialization</label><br>
            <input type="text" name="specialization"><br><br>

            <label>License Number</label><br>
            <input type="text" name="license"><br><br>

            <label>About</label><br>
            <input type="text" name="about"><br><br>

            <label>Password</label><br>
            <input type="password" name="password" required><br><br>

            <label>Confirm Password</label><br>
            <input type="password" name="confirm_password" required><br><br>

            <button class="submit-btn" type="submit">Register as Doctor</button>

        </form>

    </div>

    <!-- Patient Signup -->

    <div id="patientForm" style="display:none">

        <h3>Patient Signup</h3>

        <form method="POST" action="/signup">

            <input type="hidden" name="user_type" value="patient">

            <label>Name</label><br>
            <input type="text" name="name" required><br><br>

            <label>Email</label><br>
            <input type="email" name="email" required><br><br>

            <label>Phone</label><br>
            <input type="text" name="phone" required><br><br>

            <label>Age</label><br>
            <input type="number" name="age"><br><br>

            <label>Gender</label><br>
            <select name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select><br><br>

            <label>Password</label><br>
            <input type="password" name="password" required><br><br>

            <label>Confirm Password</label><br>
            <input type="password" name="confirm_password" required><br><br>

            <button class="submit-btn" type="submit">Register as Patient</button>

        </form>

    </div>

    <a href="/login">
        <button class="back-btn">Back to Login</button>
    </a>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
```

</body>

</html>
