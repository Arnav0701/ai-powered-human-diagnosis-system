<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prediction | Diagnosis</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="predict-page">

    <div class="bg-animated"></div>

    <div class="predict-card">

        <span class="brand-icon">🧠</span>
        <h2>AI-Powered Diagnosis</h2>
        <p class="predict-subtitle">Upload a medical image for instant analysis</p>

        <form action="/predict" method="post" enctype="multipart/form-data">

            <div class="form-group" style="text-align:left;">
                <label><i class="fas fa-file-medical"></i> Report Type</label>
                <select name="report_type" class="form-select">
                    <option value="X-Ray">X-Ray</option>
                    <option value="Pneumonia">Pneumonia</option>
                    <option value="Brain tumer">Brain tumer</option>
                </select>
            </div>

            <div class="form-group" style="text-align:left;">
                <label><i class="fas fa-upload"></i> Upload Image</label>
                <input type="file" name="file" class="form-file" required>
            </div>

            <button class="btn btn-primary btn-block" type="submit">
                <i class="fas fa-brain"></i> Predict
            </button>

        </form>

        {% if prediction %}
        <div class="result-box">
            <h3><i class="fas fa-clipboard-check"></i> Result: {{ prediction }}</h3>
            <h4>Confidence: {{ confidence }}%</h4>
            <img src="{{ image_path }}" width="300" alt="Uploaded scan">
        </div>
        {% endif %}

        <div class="predict-actions">
            <a href="/patient_dashboard">
                <button class="btn btn-back" type="button">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </button>
            </a>
        </div>

    </div>

</body>

</html>
